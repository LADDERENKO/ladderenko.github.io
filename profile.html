<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПРОФИЛЬ | DEBUG MODE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="hero-section" style="min-height: auto; padding: 20px;">
        <h1 style="font-size: 1.5em;">ТЕРМИНАЛ: <span id="debug-email">ОЖИДАНИЕ...</span></h1>
    </header>

    <main class="content-wrapper">
        <section style="max-width: 600px; margin: 20px auto; background: #1a2b3a; padding: 20px; border: 1px solid #00FF80;">
            <h3 style="color: #00FF80;">[ МОЙ ПРОФИЛЬ ]</h3>
            <input type="text" id="my-nickname" class="auth-input" placeholder="НИК" style="width: 100%; margin-bottom: 10px;">
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input type="text" id="my-badge" class="auth-input" placeholder="ПЛАШКА" style="flex-grow: 1;">
                <input type="color" id="my-color" style="width: 50px; height: 45px;">
            </div>
            <button id="save-my-btn" class="cta-button" style="width: 100%;">ОБНОВИТЬ</button>
        </section>

        <div id="admin-panel" style="display: none; max-width: 600px; margin: 20px auto; background: #2b1a1a; padding: 20px; border: 2px solid #FF0055;">
            <h3 style="color: #FF0055;">⚡ АДМИН-ДОСТУП АКТИВИРОВАН</h3>
            <input type="text" id="admin-target-uid" class="auth-input" placeholder="UID ЦЕЛИ" style="width: 100%; margin-bottom: 10px; border-color: #FF0055;">
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input type="text" id="admin-badge" class="auth-input" placeholder="НОВАЯ ПЛАШКА" style="flex-grow: 1;">
                <input type="color" id="admin-color" value="#FF0055" style="width: 50px; height: 45px;">
            </div>
            <button id="admin-save-btn" class="cta-button" style="width: 100%; background: #FF0055;">ИЗМЕНИТЬ ДАННЫЕ ЮЗЕРА</button>
        </div>

        <p id="status-msg" style="text-align: center; font-weight: bold; margin-top: 10px;"></p>
        
        <div style="text-align: center; margin-top: 20px;">
            <a href="index.html" style="color: #00FFFF;">← НАЗАД</a>
        </div>
    </main>

    <script type="module">
        // Импортируем Firebase напрямую, чтобы не зависеть от firebase-config.js (в целях теста)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCYX2Lr_OKT2yfqZCV5IYjNOZ2Bp4bZDRY",
            authDomain: "ladder-aab8a.firebaseapp.com",
            databaseURL: "https://ladder-aab8a-default-rtdb.firebaseio.com/",
            projectId: "ladder-aab8a",
            appId: "1:558510161712:web:5e35ea602eeae4afb3d2f5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ВНИМАНИЕ: Проверь, чтобы этот email в точности совпадал с твоим!
        const ADMIN_EMAIL = "sergsergserg@gmail.com"; 

        onAuthStateChanged(auth, async (user) => {
            console.log("Скрипт загружен. Проверка пользователя...");
            if (user) {
                console.log("Юзер найден:", user.email);
                document.getElementById('debug-email').innerText = user.email;

                // Проверка на админа (включаем панель если совпал email)
                if (user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase()) {
                    console.log("ДОСТУП РАЗРЕШЕН!");
                    document.getElementById('admin-panel').style.display = 'block';
                } else {
                    console.log("ДОСТУП ЗАПРЕЩЕН. ЖДАЛИ:", ADMIN_EMAIL, "ПОЛУЧИЛИ:", user.email);
                }

                // Грузим данные
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) {
                    const d = snap.data();
                    document.getElementById('my-nickname').value = d.nickname || "";
                    document.getElementById('my-badge').value = d.badgeText || "";
                    document.getElementById('my-color').value = d.badgeColor || "#00FFFF";
                }
            } else {
                console.log("Юзер не авторизован");
                location.href = "login.html";
            }
        });

        // Сохранение себя
        document.getElementById('save-my-btn').onclick = async () => {
            const user = auth.currentUser;
            try {
                await setDoc(doc(db, "users", user.uid), {
                    nickname: document.getElementById('my-nickname').value.trim(),
                    badgeText: document.getElementById('my-badge').value.trim().toUpperCase(),
                    badgeColor: document.getElementById('my-color').value,
                    email: user.email
                }, { merge: true });
                alert("ОБНОВЛЕНО!");
            } catch (e) { alert("ОШИБКА: " + e.message); }
        };

        // Админ-сохранение
        document.getElementById('admin-save-btn').onclick = async () => {
            const uid = document.getElementById('admin-target-uid').value.trim();
            try {
                await updateDoc(doc(db, "users", uid), {
                    badgeText: document.getElementById('admin-badge').value.trim().toUpperCase(),
                    badgeColor: document.getElementById('admin-color').value
                });
                alert("ДАННЫЕ ЮЗЕРА ИЗМЕНЕНЫ!");
            } catch (e) { alert("ОШИБКА: " + e.message); }
        };
    </script>
</body>
</html>
