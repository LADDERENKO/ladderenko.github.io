<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПРОФИЛЬ АДЕПТА | ЛАДДЕР-ПУШ</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="hero-section" style="min-height: auto; padding: 50px 0;">
        <div class="hero-content">
            <h1 style="font-size: 2em;">ЛИЧНОЕ ДЕЛО АДЕПТА</h1>
            <p id="user-email" style="color: #00FFFF; opacity: 0.7;"></p>
        </div>
    </header>

    <main class="content-wrapper">
        <section class="fade-in active" style="max-width: 600px; margin: 0 auto; background: rgba(26, 43, 58, 0.5); padding: 30px; border-radius: 15px; border: 1px solid #FF0055;">
            
            <div style="margin-bottom: 25px;">
                <label style="display: block; color: #00FF80; font-family: 'Michroma'; font-size: 0.8em; margin-bottom: 10px;">ВАШ ПОЗЫВНОЙ (НИКНЕЙМ):</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="new-nickname" class="auth-input" placeholder="Введите новый ник..." style="flex-grow: 1;">
                    <button id="save-nick-btn" class="cta-button" style="padding: 10px 20px;">СОХРАНИТЬ</button>
                </div>
                <p id="profile-msg" style="margin-top: 10px; font-size: 0.8em;"></p>
            </div>

            <hr style="border: 0; border-top: 1px solid #1A2B3A; margin: 30px 0;">

            <div style="display: flex; justify-content: space-between; align-items: center;">
                <button id="logout-btn" class="cta-button" style="background: transparent; border: 1px solid #FF0055; color: #FF0055;">ВЫЙТИ ИЗ СИСТЕМЫ</button>
                <a href="index.html" style="color: #00FFFF; text-decoration: none; font-size: 0.9em;">← НА ГЛАВНУЮ</a>
            </div>
        </section>
    </main>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { doc, getDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const nickInput = document.getElementById('new-nickname');
        const saveBtn = document.getElementById('save-nick-btn');
        const msg = document.getElementById('profile-msg');
        const emailLabel = document.getElementById('user-email');

        // 1. Проверяем авторизацию и подтягиваем текущие данные
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                emailLabel.innerText = user.email;
                
                // Берем данные из Firestore
                const userRef = doc(db, "users", user.uid);
                const userDoc = await getDoc(userRef);

                if (userDoc.exists()) {
                    nickInput.value = userDoc.data().nickname || "";
                }
            } else {
                // Если не залогинен — кидаем на страницу входа
                location.href = "login.html";
            }
        });

        // 2. Функция сохранения ника
        saveBtn.addEventListener('click', async () => {
            const user = auth.currentUser;
            const newNick = nickInput.value.trim();

            if (!user) return;
            if (newNick.length < 2) {
                msg.style.color = "#FF0055";
                msg.innerText = "НИК СЛИШКОМ КОРОТКИЙ!";
                return;
            }

            try {
                saveBtn.disabled = true;
                saveBtn.innerText = "ЖДИ...";
                
                const userRef = doc(db, "users", user.uid);
                
                // Проверяем, существует ли документ, если нет — создаем его через setDoc
                const userDoc = await getDoc(userRef);
                if (userDoc.exists()) {
                    await updateDoc(userRef, { nickname: newNick });
                } else {
                    await setDoc(userRef, {
                        nickname: newNick,
                        email: user.email,
                        badgeText: "АДЕПТ",
                        badgeColor: "#00FFFF"
                    });
                }

                msg.style.color = "#00FF80";
                msg.innerText = "ДАННЫЕ ОБНОВЛЕНЫ!";
                
                setTimeout(() => { msg.innerText = ""; }, 3000);
            } catch (error) {
                console.error(error);
                msg.style.color = "#FF0055";
                msg.innerText = "ОШИБКА ДОСТУПА!";
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerText = "СОХРАНИТЬ";
            }
        });

        // 3. Выход
        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => {
                location.href = "index.html";
            });
        });
    </script>
</body>
</html>
