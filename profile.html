<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПРОФИЛЬ АДЕПТА | ЛАДДЕР-ПУШ</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="hero-section" style="min-height: auto; padding: 40px 0;">
        <div class="hero-content">
            <h1 style="font-size: 2em; text-shadow: 0 0 15px #FF0055;">ЛИЧНЫЙ ТЕРМИНАЛ</h1>
            <p id="user-email-display" style="color: #00FFFF; opacity: 0.7; font-family: 'Space Mono';"></p>
        </div>
    </header>

    <main class="content-wrapper">
        <section class="fade-in active" style="max-width: 600px; margin: 0 auto 30px auto; background: rgba(26, 43, 58, 0.5); padding: 25px; border-radius: 15px; border: 1px solid #00FF80;">
            <h3 style="color: #00FF80; font-family: 'Michroma'; font-size: 0.9em; margin-bottom: 20px;">[ МОИ ДАННЫЕ ]</h3>
            
            <div style="margin-bottom: 15px;">
                <label style="display: block; color: #E6F0FF; font-size: 0.7em; margin-bottom: 5px;">НИКНЕЙМ:</label>
                <input type="text" id="my-nickname" class="auth-input" style="width: 100%;">
            </div>

            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <div style="flex-grow: 1;">
                    <label style="display: block; color: #E6F0FF; font-size: 0.7em; margin-bottom: 5px;">МОЯ ПЛАШКА:</label>
                    <input type="text" id="my-badge" class="auth-input" style="width: 100%;">
                </div>
                <div style="width: 100px;">
                    <label style="display: block; color: #E6F0FF; font-size: 0.7em; margin-bottom: 5px;">ЦВЕТ:</label>
                    <input type="color" id="my-color" style="width: 100%; height: 42px; background: #1a2b3a; border: 1px solid #00FF80; cursor: pointer;">
                </div>
            </div>

            <button id="save-my-btn" class="cta-button" style="width: 100%; padding: 12px;">ОБНОВИТЬ ПРОФИЛЬ</button>
        </section>

        <section id="admin-panel" style="display: none; max-width: 600px; margin: 0 auto; background: rgba(255, 0, 85, 0.1); padding: 25px; border-radius: 15px; border: 2px solid #FF0055; box-shadow: 0 0 20px rgba(255, 0, 85, 0.3);">
            <h3 style="color: #FF0055; font-family: 'Michroma'; font-size: 0.9em; margin-bottom: 20px;">⚡ ТЕРМИНАЛ УПРАВЛЕНИЯ (ADMIN ONLY)</h3>
            
            <div style="margin-bottom: 15px;">
                <label style="display: block; color: #FF0055; font-size: 0.7em; margin-bottom: 5px;">UID ЦЕЛИ (ИЗ FIREBASE):</label>
                <input type="text" id="admin-target-uid" class="auth-input" placeholder="Вставь UID пользователя..." style="width: 100%; border-color: #FF0055;">
            </div>

            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <div style="flex-grow: 1;">
                    <label style="display: block; color: #FF0055; font-size: 0.7em; margin-bottom: 5px;">НОВАЯ ПЛАШКА:</label>
                    <input type="text" id="admin-badge" class="auth-input" placeholder="Напр: МОДЕРАТОР" style="width: 100%;">
                </div>
                <div style="width: 100px;">
                    <label style="display: block; color: #FF0055; font-size: 0.7em; margin-bottom: 5px;">ЦВЕТ:</label>
                    <input type="color" id="admin-color" value="#FF0055" style="width: 100%; height: 42px; background: #1a2b3a; border: 1px solid #FF0055; cursor: pointer;">
                </div>
            </div>

            <button id="admin-save-btn" class="cta-button" style="width: 100%; padding: 12px; background: #FF0055;">ПЕРЕПИСАТЬ ДАННЫЕ ЦЕЛИ</button>
        </section>

        <p id="status-msg" style="margin-top: 20px; text-align: center; font-family: 'Space Mono'; font-size: 0.8em; min-height: 1.2em;"></p>

        <div style="text-align: center; margin-top: 30px;">
            <button id="logout-btn" style="background:none; border:none; color:#FF0055; cursor:pointer; font-size: 0.7em;">[ ВЫЙТИ ]</button>
            <br><br>
            <a href="index.html" style="color: #00FFFF; text-decoration: none; font-size: 0.8em;">← НА ГЛАВНУЮ</a>
        </div>
    </main>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // ВНИМАНИЕ: ВПИШИ СЮДА СВОЙ EMAIL В КАВЫЧКАХ!
        const MY_ADMIN_EMAIL = "sergsergserg@gmail.com"; 

        const status = document.getElementById('status-msg');
        const adminSection = document.getElementById('admin-panel');

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                console.log("Вход выполнен как:", user.email); // Проверь это в консоли F12
                document.getElementById('user-email-display').innerText = user.email.toUpperCase();
                
                // ПРОВЕРКА НА АДМИНА
                if (user.email.toLowerCase() === MY_ADMIN_EMAIL.toLowerCase()) {
                    console.log("Админка активирована!");
                    adminSection.style.display = 'block';
                } else {
                    console.log("Доступ к админке запрещен для:", user.email);
                }

                // Загружаем личные данные
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const d = userDoc.data();
                    document.getElementById('my-nickname').value = d.nickname || "";
                    document.getElementById('my-badge').value = d.badgeText || "";
                    document.getElementById('my-color').value = d.badgeColor || "#00FFFF";
                }
            } else {
                location.href = "login.html";
            }
        });

        // Кнопка сохранения своего профиля
        document.getElementById('save-my-btn').onclick = async () => {
            const user = auth.currentUser;
            try {
                await setDoc(doc(db, "users", user.uid), {
                    nickname: document.getElementById('my-nickname').value.trim(),
                    badgeText: document.getElementById('my-badge').value.trim().toUpperCase(),
                    badgeColor: document.getElementById('my-color').value,
                    email: user.email
                }, { merge: true });
                showStatus("ПРОФИЛЬ ОБНОВЛЕН", "#00FF80");
            } catch (e) { showStatus("ОШИБКА: " + e.message, "#FF0055"); }
        };

        // Кнопка админки (для чужого UID)
        document.getElementById('admin-save-btn').onclick = async () => {
            const uid = document.getElementById('admin-target-uid').value.trim();
            if (!uid) { showStatus("ВВЕДИ UID!", "#FF0055"); return; }
            
            try {
                await updateDoc(doc(db, "users", uid), {
                    badgeText: document.getElementById('admin-badge').value.trim().toUpperCase(),
                    badgeColor: document.getElementById('admin-color').value
                });
                showStatus("ДАННЫЕ ПОЛЬЗОВАТЕЛЯ ИЗМЕНЕНЫ", "#00FF80");
            } catch (e) { showStatus("ОШИБКА: UID НЕ ВЕРЕН", "#FF0055"); }
        };

        function showStatus(text, color) {
            status.style.color = color;
            status.innerText = text;
            setTimeout(() => status.innerText = "", 3000);
        }

        document.getElementById('logout-btn').onclick = () => signOut(auth).then(() => location.href = "index.html");
    </script>
</body>
</html>
