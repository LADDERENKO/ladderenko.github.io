<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПРОФИЛЬ АДЕПТА | ЛАДДЕР-ПУШ</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="hero-section" style="min-height: auto; padding: 40px 0;">
        <div class="hero-content">
            <h1 style="font-size: 2em; text-shadow: 0 0 15px #FF0055;">ЛИЧНЫЙ ТЕРМИНАЛ</h1>
            <p id="user-email" style="color: #00FFFF; opacity: 0.7; font-family: 'Space Mono';"></p>
        </div>
    </header>

    <main class="content-wrapper">
        <section class="fade-in active" style="max-width: 600px; margin: 0 auto 30px auto; background: rgba(26, 43, 58, 0.5); padding: 25px; border-radius: 15px; border: 1px solid #00FF80;">
            <h3 style="color: #00FF80; font-family: 'Michroma'; font-size: 0.9em; margin-bottom: 20px;">[ МОИ ДАННЫЕ ]</h3>
            
            <div style="margin-bottom: 15px;">
                <label style="display: block; color: #E6F0FF; font-size: 0.7em; margin-bottom: 5px;">НИКНЕЙМ:</label>
                <input type="text" id="my-nickname" class="auth-input" style="width: 100%;">
            </div>

            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <div style="flex-grow: 1;">
                    <label style="display: block; color: #E6F0FF; font-size: 0.7em; margin-bottom: 5px;">МОЯ ПЛАШКА:</label>
                    <input type="text" id="my-badge" class="auth-input" style="width: 100%;">
                </div>
                <div style="width: 100px;">
                    <label style="display: block; color: #E6F0FF; font-size: 0.7em; margin-bottom: 5px;">ЦВЕТ:</label>
                    <input type="color" id="my-color" style="width: 100%; height: 42px; background: #1a2b3a; border: 1px solid #00FF80; cursor: pointer;">
                </div>
            </div>

            <button id="save-my-btn" class="cta-button" style="width: 100%; padding: 12px; font-size: 0.8em;">ОБНОВИТЬ МОЙ ПРОФИЛЬ</button>
        </section>

        <section id="admin-panel" class="fade-in active" style="display: none; max-width: 600px; margin: 0 auto; background: rgba(255, 0, 85, 0.05); padding: 25px; border-radius: 15px; border: 2px solid #FF0055;">
            <h3 style="color: #FF0055; font-family: 'Michroma'; font-size: 0.9em; margin-bottom: 20px;">⚡ ТЕРМИНАЛ УПРАВЛЕНИЯ (ADMIN)</h3>
            
            <div style="margin-bottom: 15px;">
                <label style="display: block; color: #FF0055; font-size: 0.7em; margin-bottom: 5px;">UID ПОЛЬЗОВАТЕЛЯ:</label>
                <input type="text" id="admin-target-uid" class="auth-input" placeholder="Вставь UID из базы..." style="width: 100%; border-color: #FF0055;">
            </div>

            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <div style="flex-grow: 1;">
                    <label style="display: block; color: #FF0055; font-size: 0.7em; margin-bottom: 5px;">УСТАНОВИТЬ ПЛАШКУ:</label>
                    <input type="text" id="admin-badge" class="auth-input" placeholder="Напр: МОДЕРАТОР" style="width: 100%;">
                </div>
                <div style="width: 100px;">
                    <label style="display: block; color: #FF0055; font-size: 0.7em; margin-bottom: 5px;">ЦВЕТ:</label>
                    <input type="color" id="admin-color" value="#FF0055" style="width: 100%; height: 42px; background: #1a2b3a; border: 1px solid #FF0055; cursor: pointer;">
                </div>
            </div>

            <button id="admin-save-btn" class="cta-button" style="width: 100%; padding: 12px; background: #FF0055;">ПРИМЕНИТЬ К ПОЛЬЗОВАТЕЛЮ</button>
        </section>

        <p id="status-msg" style="margin-top: 20px; text-align: center; font-family: 'Space Mono'; font-size: 0.8em; min-height: 1.2em;"></p>

        <div style="text-align: center; margin-top: 30px;">
            <button id="logout-btn" style="background:none; border:none; color:#FF0055; cursor:pointer; font-size: 0.7em;">[ ВЫЙТИ ]</button>
            <br><br>
            <a href="index.html" style="color: #00FFFF; text-decoration: none; font-size: 0.8em;">← НА ГЛАВНУЮ</a>
        </div>
    </main>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { doc, getDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // ТВОЙ EMAIL ТУТ (ЗАМЕНИ НА СВОЙ)
        const ADMIN_EMAIL = "sergsergserg@gmail.com"; 

        const status = document.getElementById('status-msg');

        // Элементы "Мой профиль"
        const myNick = document.getElementById('my-nickname');
        const myBadge = document.getElementById('my-badge');
        const myColor = document.getElementById('my-color');

        // Элементы "Админка"
        const adminPanel = document.getElementById('admin-panel');
        const targetUid = document.getElementById('admin-target-uid');
        const adminBadge = document.getElementById('admin-badge');
        const adminColor = document.getElementById('admin-color');

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('user-email').innerText = user.email.toUpperCase();
                
                // 1. Показываем админку, если email совпадает
                if (user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase()) {
                    adminPanel.style.display = 'block';
                }

                // 2. Загружаем данные текущего пользователя
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const d = userDoc.data();
                    myNick.value = d.nickname || "";
                    myBadge.value = d.badgeText || "";
                    myColor.value = d.badgeColor || "#00FFFF";
                }
            } else {
                location.href = "login.html";
            }
        });

        // Сохранение своего профиля
        document.getElementById('save-my-btn').onclick = async () => {
            const user = auth.currentUser;
            if (!user) return;
            try {
                await setDoc(doc(db, "users", user.uid), {
                    nickname: myNick.value.trim(),
                    badgeText: myBadge.value.trim().toUpperCase(),
                    badgeColor: myColor.value,
                    email: user.email
                }, { merge: true });
                showStatus("ПРОФИЛЬ ОБНОВЛЕН", "#00FF80");
            } catch (e) { showStatus(e.message, "#FF0055"); }
        };

        // Админ-сохранение (для чужого UID)
        document.getElementById('admin-save-btn').onclick = async () => {
            const uid = targetUid.value.trim();
            if (!uid) { showStatus("ВВЕДИ UID ПОЛЬЗОВАТЕЛЯ!", "#FF0055"); return; }
            
            try {
                await updateDoc(doc(db, "users", uid), {
                    badgeText: adminBadge.value.trim().toUpperCase(),
                    badgeColor: adminColor.value
                });
                showStatus("ПЛАШКА УСТАНОВЛЕНА ДЛЯ " + uid, "#00FF80");
            } catch (e) { showStatus("ОШИБКА: UID НЕ НАЙДЕН", "#FF0055"); }
        };

        function showStatus(text, color) {
            status.style.color = color;
            status.innerText = text;
            setTimeout(() => status.innerText = "", 3000);
        }

        document.getElementById('logout-btn').onclick = () => signOut(auth).then(() => location.href = "index.html");
    </script>
</body>
</html>
