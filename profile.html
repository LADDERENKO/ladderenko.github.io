<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ТЕРМИНАЛ | ЛАДДЕР-ПУШ</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Space+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-container fade-in active">
        <h2 style="color:#00FFFF; font-size:1.2em; text-align:center;">ПРОФИЛЬ АДЕПТА</h2>
        <p id="u-mail" style="text-align:center; font-size:0.7em; color:#00FF80;"></p>

        <label style="font-size:0.7em; color:#5a5a72;">ВАШ НИКНЕЙМ:</label>
        <input type="text" id="my-nick" class="auth-input">
        <button id="save-nick" class="auth-btn">ОБНОВИТЬ НИК</button>

        <div id="admin-zone" style="display:none; margin-top:30px; border-top:2px solid #FF0055; padding-top:20px;">
            <h3 style="color:#FF0055; font-size:0.8em;">⚡ УПРАВЛЕНИЕ ПЛАШКАМИ</h3>
            <input type="text" id="target-uid" class="auth-input" placeholder="UID ПОЛЬЗОВАТЕЛЯ">
            <input type="text" id="new-badge" class="auth-input" placeholder="ТЕКСТ ПЛАШКИ">
            <input type="color" id="new-color" style="width:100%; height:40px; background:none; border:1px solid #FF0055; margin-bottom:15px;">
            <button id="admin-save" class="auth-btn" style="border-color:#00FF80; color:#00FF80;">ПРИМЕНИТЬ СТАТУС</button>
        </div>

        <p id="st-msg" style="text-align:center; font-size:0.8em; margin-top:15px;"></p>
        <button id="lg-out" style="background:none; border:none; color:#FF0055; width:100%; cursor:pointer; margin-top:20px; font-size:0.7em;">[ ВЫЙТИ ]</button>
    </div>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const ADMIN_EMAIL = "sergsergserg@gmail.com"; 

        onAuthStateChanged(auth, async (user) => {
            if (!user) location.href = "login.html";
            document.getElementById('u-mail').innerText = user.email;
            if (user.email === ADMIN_EMAIL) document.getElementById('admin-zone').style.display = 'block';

            const snap = await getDoc(doc(db, "users", user.uid));
            if (snap.exists()) document.getElementById('my-nick').value = snap.data().nickname || "";
        });

        document.getElementById('save-nick').onclick = async () => {
            const user = auth.currentUser;
            await setDoc(doc(db, "users", user.uid), { nickname: document.getElementById('my-nick').value }, { merge: true });
            alert("Ник обновлен!");
        };

        document.getElementById('admin-save').onclick = async () => {
            const uid = document.getElementById('target-uid').value.trim();
            await updateDoc(doc(db, "users", uid), {
                badgeText: document.getElementById('new-badge').value.toUpperCase(),
                badgeColor: document.getElementById('new-color').value
            });
            alert("Статус изменен!");
        };

        document.getElementById('lg-out').onclick = () => signOut(auth).then(() => location.href="index.html");
    </script>
</body>
</html>
